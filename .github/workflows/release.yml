name: Release

on:
  push:
    branches:
      - main
    paths:
      - "custom_components/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump patch version from latest tag
        id: bump
        run: |
          latest=$(git tag -l 'v*.*.*' --sort=-v:refname | head -n1)
          if [ -z "$latest" ]; then
            new_version="1.0.0"
          else
            IFS='.' read -r major minor patch <<< "${latest#v}"
            new_version="${major}.${minor}.$((patch + 1))"
          fi
          echo "version=$new_version" >> "$GITHUB_OUTPUT"

      - name: Update manifest for release zip
        run: |
          jq --arg v "${{ steps.bump.outputs.version }}" '.version = $v' \
            custom_components/shure_wireless/manifest.json > tmp.json
          mv tmp.json custom_components/shure_wireless/manifest.json

      - name: Create release zip
        run: |
          cd custom_components/shure_wireless
          zip -r ../../shure-wireless.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.bump.outputs.version }}"
          name: "v${{ steps.bump.outputs.version }}"
          files: shure-wireless.zip
          generate_release_notes: true
          target_commitish: ${{ github.sha }}
