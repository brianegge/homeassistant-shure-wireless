name: Add Repository Topics

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/add-topics.yml'
  workflow_dispatch:

jobs:
  add-topics:
    runs-on: ubuntu-latest
    steps:
      - name: Add topics
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.replaceAllTopics({
              owner: context.repo.owner,
              repo: context.repo.repo,
              names: ['home-assistant', 'hacs', 'integration', 'shure', 'wireless-microphone']
            });
            console.log('Topics added successfully!');
